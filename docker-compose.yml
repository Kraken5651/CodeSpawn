version: '3.9'

services:
  postgres:
    image: postgres:14-alpine
    container_name: codespawn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codespawn
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: codespawn_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U codespawn' ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codespawn_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: codespawn_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - .env.example
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: codespawn_dev
      DB_USER: codespawn
      DB_PASSWORD: dev_password
      DB_URL: postgresql://codespawn:dev_password@postgres:5432/codespawn_dev
      DB_AUTO_SYNC: 'true'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: super_secret_key_change_me
      JWT_REFRESH_SECRET: super_secret_refresh_key_change_me
      CORS_ORIGIN: http://localhost:3000
      CORS_CREDENTIALS: 'true'
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      HELMET_ENABLED: 'true'
      RATE_LIMITING_ENABLED: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/usr/src/app/src

  frontend:
    image: node:20-alpine
    container_name: codespawn_frontend
    working_dir: /usr/src/app
    ports:
      - '3000:3000'
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:5000/api
      VITE_WS_URL: ws://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

